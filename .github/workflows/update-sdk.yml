name: Update SDK Automatically

on:
  repository_dispatch:
    types: [sdk-update]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pip install poetry

      - name: Update SDK to new tag
        run: |
          poetry add git+https://github.com/pranjalv23/agent-sdk.git#${{ github.event.client_payload.tag }}

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pyproject.toml poetry.lock
          git commit -m "update sdk to ${{ github.event.client_payload.tag }}" || echo "No changes"
          git push

      - name: Tag repo
        run: |
          git tag ${{ github.event.client_payload.tag }} || echo "Tag exists"
          git push origin ${{ github.event.client_payload.tag }} || echo "Already pushed"